<!DOCTYPE html>
<html>
<head>
<title>PSX Technical Analysis</title>
<meta charset="UTF-8">
<style>
body { font-family: Arial; }
button { margin: 5px; padding: 6px 12px; }
#addForm { margin-top: 10px; padding: 10px; border: 1px solid #ccc; display:none; }
#addForm input { width: 90px; margin: 2px; }
table { border-collapse: collapse; margin-top: 10px; }
th, td { border: 1px solid #999; padding: 4px 8px; font-size: 13px; }
pre { font-size: 13px; white-space: pre-wrap; }
</style>
</head>

<body>

<h2>PSX Technical Analysis</h2>

<button onclick="showAddForm()">Add Data</button>
<button onclick="runAnalysis()">Technical Analysis</button>

<div id="addForm">
<h4>Add Row</h4>

<div>
Symbol <input id="fSymbol">
Price <input id="fPrice">
MA50-D <input id="fMA50D">
MA200-D <input id="fMA200D">
RSI-D <input id="fRSID">
MACD-H-D <input id="fMACDDD">
Signal-D <input id="fSignalD">
</div>

<div>
MA50-W <input id="fMA50W">
MA200-W <input id="fMA200W">
RSI-W <input id="fRSIW">
MACD-H-W <input id="fMACDDW">
Signal-W <input id="fSignalW">
Volume <input id="fVolume">
52W-High <input id="fHigh52">
52W-Low <input id="fLow52">
</div>

<button onclick="addRow()">Add</button>
<button onclick="hideAddForm()">Close</button>

<p><b>Updated CSV (copy into data.csv on GitHub):</b></p>
<textarea id="csvOut" rows="8" cols="120"></textarea>
</div>

<div id="output"></div>

<script>

// ===============================
// HELPERS
// ===============================
function num(v){ return v==="" ? null : Number(v); }

function zoneWidth(p){
  if(p<=50) return 3;
  if(p<=150) return 5;
  if(p<=300) return 8;
  if(p<=500) return 12;
  if(p<=700) return 15;
  return 18;
}

function range(center,w){
  return `${(center-w).toFixed(2)}–${(center+w).toFixed(2)}`;
}

// ===============================
// SUPPORT / RESISTANCE
// ===============================
function zones(s){
  const p=num(s.Price);
  const ma50=num(s["MA50-D"]);
  const ma200=num(s["MA200-D"]);
  const high52=num(s["52W-High"]);
  const w=zoneWidth(p);

  let anchors=[];
  if(ma50 && ma50<p) anchors.push(ma50);
  if(ma200 && ma200<p) anchors.push(ma200);

  anchors.sort((a,b)=>Math.abs(p-a)-Math.abs(p-b));

  let support = anchors.length===0 ? range(p-w,w) : range(anchors[0],w);

  let resAnchor=Math.ceil(p/10)*10;
  if(high52 && Math.abs(high52-p)<=w) resAnchor=high52;

  let resistance=range(resAnchor,w);
  let target=resAnchor+w*2;

  return {support,resistance,target};
}

// ===============================
// SCORING
// ===============================
function score(s){

  let pts = 0;
  let max = 0;

  const p = num(s.Price);
  const ma50 = num(s["MA50-D"]);
  const ma200 = num(s["MA200-D"]);
  const ma50w = num(s["MA50-W"]);
  const ma200w = num(s["MA200-W"]);
  const rsid = num(s["RSI-D"]);
  const rsiw = num(s["RSI-W"]);
  const macdD = num(s["MACD-H-D"]);
  const macdW = num(s["MACD-H-W"]);
  const vol = num(s["Volume"]);
  const high52 = num(s["52W-High"]);
  const low52 = num(s["52W-Low"]);

  // Price vs MA50-D (10)
  if(ma50){
    max += 10;
    pts += (p > ma50) ? 10 : 3;
  }

  // Price vs MA200-D (10)
  if(ma200){
    max += 10;
    pts += (p > ma200) ? 10 : 3;
  }

  // MA50-D vs MA200-D (8)
  if(ma50 && ma200){
    max += 8;
    pts += (ma50 > ma200) ? 8 : 2;
  }

  // MA50-W vs MA200-W (8)
  if(ma50w && ma200w){
    max += 8;
    pts += (ma50w > ma200w) ? 8 : 2;
  }

  // RSI-D (10)
  if(rsid){
    max += 10;
    if(rsid >= 40 && rsid <= 70) pts += 8;
    else if(rsid < 50) pts += 4;
    else pts += 2;
  }

  // RSI-W (10)
  if(rsiw){
    max += 10;
    if(rsiw >= 40 && rsiw <= 70) pts += 8;
    else if(rsiw < 50) pts += 4;
    else pts += 2;
  }

  // MACD-D (12)
  if(macdD !== null){
    max += 12;
    if(macdD > 0) pts += 10;
    else pts += 3;
  }

  // MACD-W (12)
  if(macdW !== null){
    max += 12;
    if(macdW > 0) pts += 10;
    else pts += 3;
  }

  // Volume (8)
  if(vol){
    max += 8;
    pts += 6;
  }

  // 52W Position (7)
  if(high52 && low52){
    max += 7;
    const distLow = (p - low52) / low52;
    const distHigh = (high52 - p) / high52;
    if(distLow <= 0.10) pts += 7;
    else if(distHigh <= 0.05) pts += 2;
    else pts += 4;
  }

  // S/R location (5)
  if(ma50 || ma200){
    max += 5;
    const anchor = ma50 && ma200
      ? (Math.abs(p - ma50) < Math.abs(p - ma200) ? ma50 : ma200)
      : (ma50 || ma200);

    if(anchor && Math.abs(p - anchor) / p <= 0.02) pts += 5;
    else pts += 2;
  }

  // Rescale
  let sc = max ? (pts / max) * 100 : 0;

  // Dual timeframe bonus (+5)
  if(ma50 && ma200 && ma50w && ma200w){
    const dailyUp = p > ma50 && p > ma200 && ma50 >= ma200;
    const weeklyUp = ma50w > ma200w;
    if(dailyUp && weeklyUp) sc += 5;
  }

  return Math.round(Math.min(sc, 100));
}

// ===============================
// VERDICT
// ===============================
function verdict(s, score, z) {

  const p = num(s.Price);
  const ma50 = num(s["MA50-D"]);
  const ma200 = num(s["MA200-D"]);
  const supportLow = Number(z.support.split("–")[0]);

  // NEW RULE: Price below both MAs + score > 42 → AVOID
  if (p < ma50 && p < ma200 && score > 42) {
    return { v: "🚫 AVOID", target: z.target };
  }

  if (score >= 82) {
    return { v: "🟢 BUY", target: z.target };
  }

  if (score <= 42) {
    return { v: "🟠 SHORT SELL", target: supportLow };
  }

  if (score >= 60) {
    return { v: "🟡 WATCH", target: z.target };
  }

  return { v: "⚪ WAIT", target: z.target };
}

// ===============================
// TRADE PLAN
// ===============================
function tradePlan(r){
  const p=num(r.Price);

  if(r.Verdict==="🟢 BUY"){
    return `
🟢 ${r.Symbol} — Buy Plan | Score: ${r.Score}
Entry: ${r.Support}
Target: ${r.Target}
R:R ≈ ${r.RR}
At ₨${p}: BUY near support; otherwise WAIT for pullback.
`;
  }

  if(r.Verdict==="🟠 SHORT SELL"){
    return `
🟠 ${r.Symbol} — Short Sale Plan | Score: ${r.Score}
Entry: ${r.Resistance}
Target: ${r.Target}
R:R ≈ ${r.RR}
At ₨${p}: SHORT near resistance only.
`;
  }

  return "";
}

// ===============================
// RENDER
// ===============================
function render(rows){

  const groupOrder = {
  "🟢 BUY": 1,
  "🟡 WATCH": 2,
  "⚪ WAIT": 3,
  "🚫 AVOID": 4,
  "🟠 SHORT SELL": 5
};

  rows.sort((a,b)=>{
    const ga=groupOrder[a.Verdict]||99;
    const gb=groupOrder[b.Verdict]||99;
    if(ga!==gb) return ga-gb;

    if(a.Verdict==="🟢 BUY") return b.Score-a.Score;
    if(a.Verdict==="🟡 WATCH") return b.Score-a.Score;
    if(a.Verdict==="⚪ WAIT") return b.Score-a.Score;
    if(a.Verdict==="🟠 SHORT SELL") return a.Score-b.Score;

    return 0;
  });

  let html="<table><tr><th>#</th><th>Symbol</th><th>Price</th><th>Support</th><th>Resistance</th><th>Target</th><th>Score</th><th>Verdict</th></tr>";

  rows.forEach((r,i)=>{
    html+=`
<tr>
<td>${i+1}</td>
<td>${r.Symbol}</td>
<td>${r.Price}</td>
<td>${r.Support}</td>
<td>${r.Resistance}</td>
<td>${r.Target}</td>
<td>${r.Score}</td>
<td>${r.Verdict}</td>
</tr>`;
  });

  html+="</table>";
const buy   = rows.filter(r => r.Verdict === "🟢 BUY").map(r => r.Symbol).join(", ") || "--";
const watch = rows.filter(r => r.Verdict === "🟡 WATCH").map(r => r.Symbol).join(", ") || "--";
const wait  = rows.filter(r => r.Verdict === "⚪ WAIT").map(r => r.Symbol).join(", ") || "--";
const avoid = rows.filter(r => r.Verdict === "🚫 AVOID").map(r => r.Symbol).join(", ") || "--";
const ss    = rows.filter(r => r.Verdict === "🟠 SHORT SELL").map(r => r.Symbol).join(", ") || "--";

html += `
<pre>
BUY = ${buy}
WATCH = ${watch}
WAIT = ${wait}
AVOID = ${avoid}
SHORT SELL = ${ss}
</pre>
`;

}

// ===============================
// RUN ANALYSIS
// ===============================
async function runAnalysis(){

  const res=await fetch("data.csv");
  const text=await res.text();

  const lines=text.trim().split("\n");
  const headers=lines[0].split(",");

  const data=lines.slice(1).map(line=>{
    const cols=line.split(",");
    const obj={};
    headers.forEach((h,i)=> obj[h.trim()]=cols[i]?cols[i].trim():"");
    return obj;
  });

  const rows=data.map(s=>{
    const z=zones(s);
    const sc=score(s);
    const v=verdict(s,sc,z);

    const p=num(s.Price);
    const supportLow=Number(z.support.split("–")[0]);
    const reward=Math.abs(v.target-p);
    const risk=Math.abs(p-supportLow);
    const rr=risk===0?0:(reward/risk).toFixed(2);

    return {
      Symbol:s.Symbol,
      Price:s.Price,
      Support:z.support,
      Resistance:z.resistance,
      Target:v.target,
      Score:sc,
      Verdict:v.v,
      RR:rr,
      TradePlan:tradePlan({
        Symbol:s.Symbol,
        Price:s.Price,
        Support:z.support,
        Resistance:z.resistance,
        Target:v.target,
        RR:rr,
        Verdict:v.v,
        Score:sc
      })
    };
  });

  render(rows);
}

// initial run
runAnalysis();

</script>

</body>
</html>
