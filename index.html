<!DOCTYPE html>
<html>
<head>
<title>PSX Technical Analysis</title>
<meta charset="UTF-8">
<style>
* { box-sizing: border-box; }
body { font-family: Arial, sans-serif; background: #f4f6f9; margin: 0; padding: 12px; }
h2 { margin: 0 0 10px; font-size: 18px; color: #222; }
button { margin: 4px; padding: 6px 14px; cursor: pointer; border: 1px solid #aaa; border-radius: 4px; background: #fff; font-size: 13px; }
button:hover { background: #e8e8e8; }

tr:hover td { background: #f0f4ff; }

.trade-plans { margin-top: 14px; }
.plan-block { background: #fff; border-radius: 6px; border-left: 4px solid #ccc; padding: 10px 14px; margin-bottom: 10px; font-size: 13px; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
.plan-block.buy { border-color: #27ae60; }
.plan-block.sell { border-color: #e74c3c; }
.plan-block.short { border-color: #e67e22; }
.plan-block h4 { margin: 0 0 6px; font-size: 13px; }
.plan-block code { display:block; background:#f7f7f7; padding:5px 8px; border-radius:4px; margin:4px 0; font-size:12px; }
.plan-block p { margin: 4px 0 0; font-style: italic; color: #555; font-size: 12px; }
</style>

<body>

<h2>📊 PSX Technical Analysis</h2>
<button onclick="runAnalysis()">▶ Run Analysis</button>
<button onclick="showAddForm()">＋ Add / Edit Row</button>
<button onclick="exportCSV()">⬇ Export CSV</button>

<div id="addForm">
  <h4>Add / Update Row</h4>
  <div>
    <label>Symbol</label><input id="fSymbol" placeholder="e.g. MCB">
    <label>Price</label><input id="fPrice" placeholder="403.86">
    <label>MA50-D</label><input id="fMA50D">
    <label>MA200-D</label><input id="fMA200D">
    <label>RSI-D</label><input id="fRSID">
    <label>MACD-H-D</label><input id="fMACDHD">
    <label>Signal-D</label><input id="fSignalD">
  </div>
  <div style="margin-top:6px">
    <label>MA50-W</label><input id="fMA50W">
    <label>MA200-W</label><input id="fMA200W">
    <label>RSI-W</label><input id="fRSIW">
    <label>MACD-H-W</label><input id="fMACDHW">
    <label>Signal-W</label><input id="fSignalW">
    <label>Volume</label><input id="fVolume">
    <label>52W-High</label><input id="f52High">
    <label>52W-Low</label><input id="f52Low">
    <label>Swing-Low</label><input id="fSwingLow" placeholder="optional">
    <label>Swing-High</label><input id="fSwingHigh" placeholder="optional">
  </div>
  <div style="margin-top:8px">
    <button onclick="addRow()">Save Row</button>
    <button onclick="hideAddForm()">Close</button>
  </div>
  <p style="margin-top:8px"><b>Updated CSV (copy into data.csv on GitHub):</b></p>
  <textarea id="csvOut" rows="8" style="width:100%;font-size:12px;border:1px solid #ccc;border-radius:4px;padding:6px;"></textarea>
</div>

<div id="output"></div>

<script>
// ─────────────────────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────────────────────
function num(v){ return (v === "" || v === undefined || v === null) ? null : Number(v); }

// Strip trailing .00 or unnecessary decimals
function fmt(v){
  const n = parseFloat(v);
  if(isNaN(n)) return v;
  // Remove .00 and .X0 trailing zeros
  return parseFloat(n.toFixed(2)).toString();
}

function fmtRange(lo, hi){
  return `${Math.floor(lo)}–${Math.floor(hi)}`;
}

// ─────────────────────────────────────────────────────────
// ZONE WIDTH — full zone width from skill table
// Zone is applied as anchor ± (w/2) giving tight ranges
// ─────────────────────────────────────────────────────────
function zoneWidth(p){
  // Returns FULL width. Half-width (±) = w/2.
  if(p <= 50)  return 3;   // ±1.5
  if(p <= 150) return 5;   // ±2.5
  if(p <= 300) return 8;   // ±4
  if(p <= 500) return 8;   // ±4   (skill: 8–12, use minimum for tightness)
  if(p <= 700) return 10;  // ±5   (skill: 10–15, use minimum)
  return 12;               // ±6   (skill: 12–18, use minimum)
}

// ─────────────────────────────────────────────────────────
// SUPPORT & RESISTANCE — exactly matching skill logic
//
// SUPPORT:
//   Primary anchor = MA200-D (deeper, stronger support)
//   S2 anchor = MA50-D (closer to price, first support)
//   If both MAs within one zone-width → merge into one zone
//   Optional: Swing-Low overrides MA200 anchor
//
// RESISTANCE:
//   Zone = [price+w, price+2w]  (forward zone above price)
//   If 52W-High falls within or just above → snap to 52W-High
//
// TARGET:
//   52W-High when it is above resistance zone top
//   Otherwise next round-10 above resistance top
// ─────────────────────────────────────────────────────────
function computeZones(s){
  const p      = num(s.Price);
  const ma50   = num(s["MA50-D"]);
  const ma200  = num(s["MA200-D"]);
  const high52 = num(s["52W-High"]);
  const low52  = num(s["52W-Low"]);
  const swLow  = num(s["Swing-Low"]);
  const swHigh = num(s["Swing-High"]);
  const w      = zoneWidth(p);
  const hw     = w / 2;  // half-width applied each side

  // ── SUPPORT ──────────────────────────────────────────
  let supportZone, s2Zone = null;

  if(swLow !== null){
    // Swing-Low overrides MA anchor
    supportZone = fmtRange(swLow - hw, swLow + hw);
  } else {
    const ma200Below = (ma200 !== null && ma200 < p) ? ma200 : null;
    const ma50Below  = (ma50  !== null && ma50  < p) ? ma50  : null;

    if(ma200Below !== null && ma50Below !== null){
      const gap = Math.abs(ma50Below - ma200Below);
      if(gap <= w){
        // Merge: both MAs within one zone-width — use midpoint
        const avg = (ma50Below + ma200Below) / 2;
        supportZone = fmtRange(avg - hw, avg + hw);
      } else {
        // S1 = MA200 (primary deeper support), S2 = MA50 (first support)
        supportZone = fmtRange(ma200Below - hw, ma200Below + hw);
        s2Zone      = fmtRange(ma50Below  - hw, ma50Below  + hw);
      }
    } else if(ma200Below !== null){
      supportZone = fmtRange(ma200Below - hw, ma200Below + hw);
    } else if(ma50Below !== null){
      supportZone = fmtRange(ma50Below - hw, ma50Below + hw);
    } else {
      // Both MAs above price — support estimated below
      supportZone = fmtRange(p - w*2, p - w);
    }
  }

  // ── RESISTANCE ───────────────────────────────────────
  // Zone starts at price+w, ends at price+2w
  let resLo, resHi;
  if(swHigh !== null){
    resLo = swHigh - hw;
    resHi = swHigh + hw;
  } else {
    resLo = p + w;
    resHi = p + 2 * w;
    // Snap to 52W-High if it falls within or just above resistance zone
    if(high52 !== null && high52 >= resLo && high52 <= resHi + w){
      resLo = high52 - hw;
      resHi = high52 + hw;
    }
  }
  const resistanceZone = fmtRange(resLo, resHi);

  // ── TARGET ───────────────────────────────────────────
  let target;
  if(high52 !== null && high52 > resHi){
    // 52W-High is above resistance top → use as target
    target = high52;
  } else {
    // Next round-10 above resistance top
    target = Math.ceil(resHi / 10) * 10 + 10;
  }

  // ── DOWNSIDE TARGET (SHORT/SELL plans) ───────────────
  const downsideTarget = (low52 !== null) ? low52
    : parseFloat(supportZone.split("–")[0]) - w;

  return { supportZone, s2Zone, resistanceZone, target, downsideTarget, w, hw };
}

// ─────────────────────────────────────────────────────────
// SCORING — /100 matching skill exactly
// ─────────────────────────────────────────────────────────
// ─────────────────────────────────────────────────────────
// LOCKED SCORING TABLE — deterministic, no judgment
// Matches /technical-analysis skill exactly.
// Verified against: MEBL=75, MTL=82, UBL=76
// ─────────────────────────────────────────────────────────
// Price vs MA50-D  (10): above=10 / below=3
// Price vs MA200-D (10): above=10 / below=3
// MA50-D vs MA200-D(8):  golden(MA50≥MA200)=8 / death=2
// MA50-W vs MA200-W(8):  golden(MA50W>MA200W)=8 / death=2
// RSI-D  (10): 40-70=8 / <40(oversold)=8 / >70(overbought)=2
// RSI-W  (10): 40-70=8 / <40=8 / >70=2
// MACD-D (12): pos+rising=12 / pos+notRising=6 / neg+turningUp=4 / neg+falling=2
// MACD-W (12): same as MACD-D
//   rising = histogram > signal line
// Volume (8):  present=6 / missing=0
// 52W    (7):  distLow≤10%=7 / distHigh≤5%=1 / distHigh≤9%=2 / mid=5
// S/R    (5):  pct≤2%=5 / pct≤5%=4 / pct≤10%=2 / >10%=0
//   pct = |price - nearest MA| / price
// Dual-TF +5: (P>MA50D & P>MA200D & MA50D≥MA200D & MACD-D>0) AND (MA50W>MA200W & MACD-W>0)
// ─────────────────────────────────────────────────────────
function scoreRow(s){
  let pts = 0, max = 0;

  const p      = num(s.Price);
  const ma50d  = num(s["MA50-D"]);
  const ma200d = num(s["MA200-D"]);
  const ma50w  = num(s["MA50-W"]);
  const ma200w = num(s["MA200-W"]);
  const rsid   = num(s["RSI-D"]);
  const rsiw   = num(s["RSI-W"]);
  const macdD  = num(s["MACD-H-D"]);
  const sigD   = num(s["Signal-D"]);
  const macdW  = num(s["MACD-H-W"]);
  const sigW   = num(s["Signal-W"]);
  const vol    = num(s.Volume);
  const high52 = num(s["52W-High"]);
  const low52  = num(s["52W-Low"]);

  // Price vs MA50-D (10)
  if(ma50d !== null){ max += 10; pts += (p > ma50d) ? 10 : 3; }

  // Price vs MA200-D (10)
  if(ma200d !== null){ max += 10; pts += (p > ma200d) ? 10 : 3; }

  // MA50-D vs MA200-D (8)
  if(ma50d !== null && ma200d !== null){ max += 8; pts += (ma50d >= ma200d) ? 8 : 2; }

  // MA50-W vs MA200-W (8)
  if(ma50w !== null && ma200w !== null){ max += 8; pts += (ma50w > ma200w) ? 8 : 2; }

  // RSI-D (10)
  if(rsid !== null){
    max += 10;
    pts += (rsid >= 40 && rsid <= 70) ? 8 : (rsid < 40) ? 8 : 2;
  }

  // RSI-W (10)
  if(rsiw !== null){
    max += 10;
    pts += (rsiw >= 40 && rsiw <= 70) ? 8 : (rsiw < 40) ? 8 : 2;
  }

  // MACD Hist-D (12)
  if(macdD !== null){
    max += 12;
    const pos = macdD > 0;
    const ris = (sigD !== null) ? (macdD > sigD) : false;
    pts += pos ? (ris ? 12 : 6) : (ris ? 4 : 2);
  }

  // MACD Hist-W (12)
  if(macdW !== null){
    max += 12;
    const pos = macdW > 0;
    const ris = (sigW !== null) ? (macdW > sigW) : false;
    pts += pos ? (ris ? 12 : 6) : (ris ? 4 : 2);
  }

  // Volume (8)
  if(vol !== null){ max += 8; pts += 6; }

  // 52W Position (7)
  if(high52 !== null && low52 !== null){
    max += 7;
    const dL = (p - low52)  / (low52  || 1);
    const dH = (high52 - p) / (high52 || 1);
    pts += dL <= 0.10 ? 7 : dH <= 0.05 ? 1 : dH <= 0.09 ? 2 : 5;
  }

  // S/R Location (5)
  if(ma50d !== null || ma200d !== null){
    max += 5;
    const avail   = [ma50d, ma200d].filter(x => x !== null);
    const closest = avail.reduce((a, b) => Math.abs(p-a) < Math.abs(p-b) ? a : b);
    const pct     = Math.abs(p - closest) / p;
    pts += pct <= 0.02 ? 5 : pct <= 0.05 ? 4 : pct <= 0.10 ? 2 : 0;
  }

  // Rescale to /100
  let sc = max > 0 ? (pts / max) * 100 : 0;

  // Dual Timeframe Bonus (+5)
  const dailyBull  = ma50d !== null && ma200d !== null &&
                     p > ma50d && p > ma200d && ma50d >= ma200d &&
                     macdD !== null && macdD > 0;
  const weeklyBull = ma50w !== null && ma200w !== null &&
                     ma50w > ma200w && macdW !== null && macdW > 0;
  if(dailyBull && weeklyBull) sc += 5;

  return Math.round(Math.min(Math.max(sc, 0), 100));
}

// ─────────────────────────────────────────────────────────
// VERDICT — with R:R gate
// ─────────────────────────────────────────────────────────
function verdictFn(s, sc, z){
  const p      = num(s.Price);
  const ma50d  = num(s["MA50-D"]);
  const ma200d = num(s["MA200-D"]);
  const ma50w  = num(s["MA50-W"]);
  const ma200w = num(s["MA200-W"]);
  const rsid   = num(s["RSI-D"]);
  const macdD  = num(s["MACD-H-D"]);
  const high52 = num(s["52W-High"]);

  const supLo  = parseFloat(z.supportZone.split("–")[0]);
  const reward = Math.abs(z.target - p);
  const risk   = Math.abs(p - supLo) || 1;
  const rr     = reward / risk;

  const near52High = high52 !== null && (high52 - p) / (high52 || 1) <= 0.05;

  // SHORT SALE: full bear checklist
  const deathCross   = ma50d !== null && ma200d !== null && ma50d < ma200d;
  const belowBothMAs = ma50d !== null && ma200d !== null && p < ma50d && p < ma200d;
  const weeklyBear   = ma50w !== null && ma200w !== null && ma50w < ma200w;
  const macdBearish  = macdD !== null && macdD < 0;
  const rsiWeak      = rsid  !== null && rsid < 50;

  if(belowBothMAs && deathCross && weeklyBear && macdBearish && rsiWeak && sc <= 42){
    return { v:"🟠 SHORT SALE", verdict:"SHORT SALE", target:z.downsideTarget, rr:rr.toFixed(2) };
  }

  // SELL
  if(belowBothMAs && macdBearish && sc >= 43 && sc <= 55){
    return { v:"🔴 SELL", verdict:"SELL", target:z.downsideTarget, rr:rr.toFixed(2) };
  }

  // Apply R:R gate: if < 1.5:1 → downgrade effective score
  let effectiveSc = sc;
  if(rr < 1.5) effectiveSc = Math.max(sc - 15, 0);

  // BUY conditions count
  const buyCount = [
    ma50d  !== null && p > ma50d,
    ma200d !== null && p > ma200d,
    ma50d  !== null && ma200d !== null && ma50d >= ma200d,
    ma50w  !== null && ma200w !== null && ma50w > ma200w,
    macdD  !== null && macdD > 0,
    rsid   !== null && rsid >= 40 && rsid <= 70,
  ].filter(Boolean).length;

  if(effectiveSc >= 75 && buyCount >= 4){
    const label = near52High ? "🟢 BUY ⚠️" : "🟢 BUY";
    return { v:label, verdict:"BUY", target:z.target, rr:rr.toFixed(2) };
  }
  if(effectiveSc >= 60 && buyCount >= 3){
    return { v:"🟢 BUY", verdict:"BUY", target:z.target, rr:rr.toFixed(2) };
  }

  // AVOID when below both MAs but score not bearish enough for SHORT
  if(belowBothMAs && effectiveSc > 42){
    return { v:"🚫 AVOID", verdict:"AVOID", target:z.target, rr:rr.toFixed(2) };
  }

  if(effectiveSc >= 50) return { v:"🟡 WATCH", verdict:"WATCH", target:z.target, rr:rr.toFixed(2) };
  if(effectiveSc >= 40) return { v:"⚪ WAIT",  verdict:"WAIT",  target:z.target, rr:rr.toFixed(2) };

  return { v:"🚫 AVOID", verdict:"AVOID", target:z.target, rr:rr.toFixed(2) };
}

// ─────────────────────────────────────────────────────────
// TRADE PLANS
// ─────────────────────────────────────────────────────────
function tradePlan(r){
  const p    = parseFloat(r.Price);
  const supLo = parseFloat(r.Support.split("–")[0]);
  const supHi = parseFloat(r.Support.split("–")[1]);

  if(r.Verdict === "BUY"){
    const inZone = p <= supHi * 1.02;
    const action = inZone
      ? `BUY NOW — price is in/near entry zone`
      : `WAIT — price above entry zone; watch for pullback to ${r.Support}`;
    return { cls:"buy",
      header:`🟢 ${r.Symbol} — Buy Plan | Score: ${r.Score}`,
      code:`Entry: ${r.Support} | Target: ₨${fmt(r.Target)} | R:R ≈ ${r.RR}`,
      note:`At ₨${p}: ${action}` };
  }
  if(r.Verdict === "SHORT SALE"){
    return { cls:"short",
      header:`🟠 ${r.Symbol} — Short Sale Plan | Score: ${r.Score}`,
      code:`Entry: ${r.Resistance} | Stop: ${r.Resistance.split("–")[1]} | Target: ₨${fmt(r.Target)} | R:R ≈ ${r.RR}`,
      note:`At ₨${p}: SHORT near resistance only. Downside ₨${fmt(r.Target)}.` };
  }
  if(r.Verdict === "SELL"){
    return { cls:"sell",
      header:`🔴 ${r.Symbol} — Sell Plan | Score: ${r.Score}`,
      code:`Exit zone: ${r.Resistance} | Reason: Price losing MA support, MACD bearish`,
      note:`At ₨${p}: TRIM NOW — reduce position at current levels` };
  }
  return null;
}

// ─────────────────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────────────────
function render(rows){
  const order = { "BUY":1,"WATCH":2,"WAIT":3,"SELL":4,"SHORT SALE":5,"AVOID":6 };

  rows.sort((a,b) => {
    const ga = order[a.Verdict] || 9, gb = order[b.Verdict] || 9;
    if(ga !== gb) return ga - gb;
    if(["BUY","WATCH","WAIT"].includes(a.Verdict)) return b.Score - a.Score;
    if(a.Verdict === "SHORT SALE") return a.Score - b.Score;
    return 0;
  });

  let html = `<table>
    <tr>
      <th>#</th><th>Symbol</th><th>Price</th>
      <th>Support</th><th>S2</th>
      <th>Resistance</th><th>Target</th>
      <th>Score</th><th>Verdict</th>
    </tr>`;

  rows.forEach((r, i) => {
    html += `<tr>
      <td>${i+1}</td>
      <td><b>${r.Symbol}</b></td>
      <td>${fmt(r.Price)}</td>
      <td>${r.Support}</td>
      <td>${r.S2 || "—"}</td>
      <td>${r.Resistance}</td>
      <td>${fmt(r.Target)}</td>
      <td><b>${r.Score}</b></td>
      <td>${r.VLabel}</td>
    </tr>`;
  });
  html += "</table>";

  const g = v => rows.filter(r => r.Verdict === v).map(r => r.Symbol).join(", ") || "—";
  html += `<pre>
─────────────────────────────────────
📈 BUY        → ${g("BUY")}
👀 WATCH      → ${g("WATCH")}
⏳ WAIT       → ${g("WAIT")}
📉 SELL/SHORT → ${g("SELL")}, ${g("SHORT SALE")}
🚫 AVOID      → ${g("AVOID")}
─────────────────────────────────────</pre>`;

  const planRows = rows.filter(r => ["BUY","SELL","SHORT SALE"].includes(r.Verdict));
  if(planRows.length){
    html += `<div class="trade-plans">`;
    planRows.forEach(r => {
      const plan = tradePlan(r);
      if(!plan) return;
      html += `<div class="plan-block ${plan.cls}">
        <h4>${plan.header}</h4>
        <code>${plan.code}</code>
        <p>${plan.note}</p>
      </div>`;
    });
    html += `</div>`;
  }

  document.getElementById("output").innerHTML = html;
}

// ─────────────────────────────────────────────────────────
// MAIN
// ─────────────────────────────────────────────────────────
let _rawData = [];

async function runAnalysis(){
  document.getElementById("output").innerHTML = "<p>Running analysis…</p>";
  try {
    const res    = await fetch("data.csv?" + Date.now());
    const text   = await res.text();
    const bom    = text.charCodeAt(0) === 0xFEFF ? text.slice(1) : text;
    const lines  = bom.trim().split(/\r?\n/);
    const headers = lines[0].split(",").map(h => h.trim());
    _rawData = lines.slice(1).filter(l => l.trim()).map(line => {
      const cols = line.split(",");
      const obj  = {};
      headers.forEach((h, i) => obj[h] = (cols[i] || "").trim());
      return obj;
    });
  } catch(e){
    document.getElementById("output").innerHTML = `<p style="color:red">Could not load data.csv: ${e.message}</p>`;
    return;
  }

  const rows = _rawData.map(s => {
    const z  = computeZones(s);
    const sc = scoreRow(s);
    const vr = verdictFn(s, sc, z);
    return {
      Symbol:     s.Symbol,
      Price:      s.Price,
      Support:    z.supportZone,
      S2:         z.s2Zone,
      Resistance: z.resistanceZone,
      Target:     vr.target,
      Score:      sc,
      VLabel:     vr.v,
      Verdict:    vr.verdict,
      RR:         vr.rr,
    };
  });

  render(rows);
}

// ─────────────────────────────────────────────────────────
// ADD ROW
// ─────────────────────────────────────────────────────────
function addRow(){
  const fields = ["Symbol","Price","MA50-D","MA200-D","RSI-D","MACD-H-D","Signal-D",
                  "MA50-W","MA200-W","RSI-W","MACD-H-W","Signal-W","Volume","52W-High","52W-Low",
                  "Swing-Low","Swing-High"];
  const ids    = ["fSymbol","fPrice","fMA50D","fMA200D","fRSID","fMACDHD","fSignalD",
                  "fMA50W","fMA200W","fRSIW","fMACDHW","fSignalW","fVolume","f52High","f52Low",
                  "fSwingLow","fSwingHigh"];
  const newRow = {};
  fields.forEach((f, i) => newRow[f] = (document.getElementById(ids[i]).value || "").trim());
  if(!newRow.Symbol || !newRow.Price){ alert("Symbol and Price are required."); return; }
  _rawData = _rawData.filter(r => r.Symbol.toUpperCase() !== newRow.Symbol.toUpperCase());
  _rawData.push(newRow);
  exportToTextarea();
  runAnalysis();
  hideAddForm();
}

function exportToTextarea(){
  const headers = ["Symbol","Price","MA50-D","MA200-D","RSI-D","MACD-H-D","Signal-D",
                   "MA50-W","MA200-W","RSI-W","MACD-H-W","Signal-W","Volume","52W-High","52W-Low",
                   "Swing-Low","Swing-High"];
  const lines = [headers.join(",")];
  _rawData.forEach(r => lines.push(headers.map(h => r[h] || "").join(",")));
  document.getElementById("csvOut").value = lines.join("\n");
}

function exportCSV(){
  const headers = ["Symbol","Price","MA50-D","MA200-D","RSI-D","MACD-H-D","Signal-D",
                   "MA50-W","MA200-W","RSI-W","MACD-H-W","Signal-W","Volume","52W-High","52W-Low",
                   "Swing-Low","Swing-High"];
  const lines = [headers.join(",")];
  _rawData.forEach(r => lines.push(headers.map(h => r[h] || "").join(",")));
  const blob = new Blob([lines.join("\n")], {type:"text/csv"});
  const a = document.createElement("a"); a.href = URL.createObjectURL(blob);
  a.download = "data.csv"; a.click();
}

function showAddForm(){ document.getElementById("addForm").style.display="block"; }
function hideAddForm(){ document.getElementById("addForm").style.display="none"; }

runAnalysis();
