<!DOCTYPE html>
<html>
<head>
<title>PSX Technical Analysis</title>
<meta charset="UTF-8">
<style>
  body { font-family: Arial, sans-serif; margin: 20px; background-color: #f9f9f9; color: #333; }
  h2 { color: #111; }
  .btn-container { margin-bottom: 20px; }
  button { padding: 10px 15px; font-size: 14px; cursor: pointer; margin-right: 10px; background-color: #0066cc; color: white; border: none; border-radius: 4px; }
  button:hover { background-color: #004999; }
  table { border-collapse: collapse; width: 100%; background: #fff; margin-top: 10px; }
  th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
  th { background-color: #f2f2f2; }
  #form-container { display: none; background: #fff; padding: 20px; border: 1px solid #ccc; margin-bottom: 20px; border-radius: 5px; width: 300px; }
  #form-container input { display: block; width: 100%; margin-bottom: 10px; padding: 6px; box-sizing: border-box; }
</style>
</head>

<body>
<h2>PSX Technical Analysis</h2>

<!-- ACTION BUTTONS -->
<div class="btn-container">
  <button onclick="toggleAddForm()">➕ Add Data</button>
  <button onclick="runTechnicalAnalysis()">📈 Technical Analysis</button>
</div>

<!-- ADD DATA FORM -->
<div id="form-container">
  <h3>Add New Stock Data</h3>
  <form id="dataForm" onsubmit="saveDataRow(event)">
    <input type="text" id="inSymbol" placeholder="Symbol (e.g. LUCK)" required>
    <input type="number" step="any" id="inPrice" placeholder="Price" required>
    <input type="number" step="any" id="inMA50D" placeholder="MA50-D">
    <input type="number" step="any" id="inMA200D" placeholder="MA200-D">
    <input type="number" step="any" id="inMA50W" placeholder="MA50-W">
    <input type="number" step="any" id="inMA200W" placeholder="MA200-W">
    <input type="number" step="any" id="inRSID" placeholder="RSI-D">
    <input type="number" step="any" id="inRSIW" placeholder="RSI-W">
    <input type="number" step="any" id="inMACDD" placeholder="MACD-H-D">
    <input type="number" step="any" id="inMACDW" placeholder="MACD-H-W">
    <input type="number" step="any" id="inVolume" placeholder="Volume">
    <input type="number" step="any" id="inHigh52" placeholder="52W-High">
    <input type="number" step="any" id="inLow52" placeholder="52W-Low">
    <button type="submit">Save to CSV</button>
  </form>
</div>

<div id="output"></div>

<script>
// ===============================
// CONFIG & STATE
// ===============================
const csvFile = "data.csv";
let globalCSVText = "";

function toggleAddForm() {
  const form = document.getElementById("form-container");
  form.style.display = form.style.display === "block" ? "none" : "block";
}

// ===============================
// LOAD CSV
// ===============================
async function loadCSV() {
  try {
    const res = await fetch(csvFile);
    globalCSVText = await res.text();
    return parseCSV(globalCSVText);
  } catch (err) {
    document.getElementById("output").innerHTML = "<p style='color:red;'>Error loading data.csv. Make sure the file exists in the repository.</p>";
    return [];
  }
}

function parseCSV(text) {
  const lines = text.trim().split("\n");
  if (lines.length === 0) return [];
  const headers = lines[0].split(",");
  return lines.slice(1).map(line => {
    const cols = line.split(",");
    const obj = {};
    headers.forEach((h, i) => obj[h.trim()] = cols[i] ? cols[i].trim() : "");
    return obj;
  });
}

function saveDataRow(e) {
  e.preventDefault();
  const symbol = document.getElementById("inSymbol").value.trim().toUpperCase();
  const price = document.getElementById("inPrice").value;
  const ma50d = document.getElementById("inMA50D").value;
  const ma200d = document.getElementById("inMA200D").value;
  const ma50w = document.getElementById("inMA50W").value;
  const ma200w = document.getElementById("inMA200W").value;
  const rsid = document.getElementById("inRSID").value;
  const rsiw = document.getElementById("inRSIW").value;
  const macdd = document.getElementById("inMACDD").value;
  const macdw = document.getElementById("inMACDW").value;
  const volume = document.getElementById("inVolume").value;
  const high52 = document.getElementById("inHigh52").value;
  const low52 = document.getElementById("inLow52").value;

  const newRow = `\n${symbol},${price},${ma50d},${ma200d},${ma50w},${ma200w},${rsid},${rsiw},${macdd},${macdw},${volume},${high52},${low52}`;
  globalCSVText += newRow;

  const blob = new Blob([globalCSVText], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'data.csv';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);

  alert("Row added! Please replace 'data.csv' in your GitHub repository with the newly downloaded file.");
  document.getElementById("dataForm").reset();
  toggleAddForm();
  runTechnicalAnalysis();
}

// ===============================
// HELPERS
// ===============================
function num(v){ return v==="" || v===undefined ? null : Number(v); }

function zoneWidth(p){
  if(p<=50) return 3;
  if(p<=150) return 5;
  if(p<=300) return 8;
  if(p<=500) return 12;
  if(p<=700) return 15;
  return 18;
}

function range(center,w){
  return `${(center-w).toFixed(2)}–${(center+w).toFixed(2)}`;
}

// ===============================
// SUPPORT / RESISTANCE
// ===============================
function zones(s){
  const p=num(s.Price);
  const ma50=num(s["MA50-D"]);
  const ma200=num(s["MA200-D"]);
  const high52=num(s["52W-High"]);
  const w=zoneWidth(p || 0);

  let anchors=[];
  if(ma50 && ma50<p) anchors.push(ma50);
  if(ma200 && ma200<p) anchors.push(ma200);
  anchors.sort((a,b)=>Math.abs(p-a)-Math.abs(p-b));

  let support="";
  if(anchors.length===0) support=range(p-w,w);
  else support=range(anchors[0],w);

  let resAnchor=Math.ceil(p/10)*10;
  if(high52 && Math.abs(high52-p)<=w) resAnchor=high52;
  let resistance=range(resAnchor,w);
  let target=resAnchor+w*2;

  return {support,resistance,target};
}

// ===============================
// SKILL-BASED SCORING
// ===============================
function score(s){
  let pts = 0;
  let max = 0;

  const p = num(s.Price);
  const ma50 = num(s["MA50-D"]);
  const ma200 = num(s["MA200-D"]);
  const ma50w = num(s["MA50-W"]);
  const ma200w = num(s["MA200-W"]);
  const rsid = num(s["RSI-D"]);
  const rsiw = num(s["RSI-W"]);
  const macdD = num(s["MACD-H-D"]);
  const macdW = num(s["MACD-H-W"]);
  const vol = num(s["Volume"]);
  const high52 = num(s["52W-High"]);
  const low52 = num(s["52W-Low"]);

  if(ma50){ max+=10; pts += (p > ma50 ? 10 : 5); }
  if(ma200){ max+=10; pts += (p > ma200 ? 10 : 5); }
  if(ma50 && ma200){ max+=8; pts += (ma50 >= ma200 ? 8 : 4); }
  if(ma50w && ma200w){ max+=8; pts += (ma50w >= ma200w ? 8 : 4); }
  if(rsid){ max+=10; pts += (rsid>=40 && rsid<=70 ? 10 : (rsid<50 ? 5 : 0)); }
  if(rsiw){ max+=10; pts += (rsiw>=40 && rsiw<=70 ? 10 : (rsiw<55 ? 5 : 0)); }
  if(macdD !== null){ max+=12; pts += (macdD>0 ? 12 : 6); }
  if(macdW !== null){ max+=12; pts += (macdW>0 ? 12 : 6); }
  if(vol){ max+=8; pts += 6; }

  if(high52 && low52 && low52 > 0){
    max+=7;
    const distLow = (p - low52) / low52;
    const distHigh = (high52 - p) / high52;
    if(distLow <= 0.10) pts += 7;
    else if(distHigh <= 0.05) pts += 2;
    else pts += 4;
  }

  let sc = max ? (pts/max)*100 : 0;

  if(ma50 && ma200 && ma50w && ma200w){
    const dailyUp = p>ma50 && p>ma200 && ma50>=ma200;
    const weeklyUp = ma50w>=ma200w;
    if(dailyUp && weeklyUp) sc += 5;
  }

  return Math.round(Math.min(sc,100));
}

// ===============================
// VERDICT & SCORING-BASED BUY / SELL RULES
// ===============================
function verdict(s,scoreVal,z){
  const p = num(s.Price);
  const ma50 = num(s["MA50-D"]);
  const ma200 = num(s["MA200-D"]);
  const ma50w = num(s["MA50-W"]);
  const ma200w = num(s["MA200-W"]);
  const rsid = num(s["RSI-D"]);
  const macdD = num(s["MACD-H-D"]);
  const macdW = num(s["MACD-H-W"]);

  const [s1] = z.support.split("–").map(Number);
  const reward = Math.abs(z.target - p);
  const risk = Math.abs(p - s1);
  const rr = risk === 0 ? 0 : reward / risk;

  let v = "⚪ WAIT";

  const buyCond =
    scoreVal >= 70 &&
    p > ma50 && p > ma200 &&
    ma50 >= ma200 &&
    ma50w >= ma200w &&
    macdD >= 0 &&
    rsid >= 40 && rsid <= 70 &&
    rr >= 1.5;

  const sellCond =
    scoreVal < 45 ||
    (macdD < 0 && macdW < 0) ||
    p < ma200;

  const shortCond =
    p < ma50 && p < ma200 &&
    ma50 < ma200 &&
    macdD < 0 && macdW < 0 &&
    rsid < 50 &&
    rr >= 1.5;

  if(buyCond) v = "🟢 BUY";
  else if(sellCond) v = "🔴 SELL";
  else if(shortCond) v = "🟠 SHORT SALE";
  else if(scoreVal >= 45 && scoreVal < 70) v = "🟡 WATCH";

  return {v, rr: rr.toFixed(2)};
}

// ===============================
// RENDER
// ===============================
function render(rows){
  let html="<table><tr><th>#</th><th>Symbol</th><th>Price</th><th>Support</th><th>Resistance</th><th>Target</th><th>Score</th><th>Verdict</th></tr>";

  rows.forEach((r,i)=>{
    html+=`<tr>
      <td>${i+1}</td>
      <td>${r.Symbol}</td>
      <td>${r.Price}</td>
      <td>${r.Support}</td>
      <td>${r.Resistance}</td>
      <td>${r.Target}</td>
      <td>${r.Score}</td>
      <td>${r.Verdict}</td>
    </tr>`;
  });

  html+="</table>";

  const buy=rows.filter(r=>r.Verdict.startsWith("🟢")).map(r=>r.Symbol).join(", ")||"—";
  const watch=rows.filter(r=>r.Verdict.startsWith("🟡")).map(r=>r.Symbol).join(", ")||"—";
  const wait=rows.filter(r=>r.Verdict.startsWith("⚪")).map(r=>r.Symbol).join(", ")||"—";
  const sell=rows.filter(r=>r.Verdict.startsWith("🔴")||r.Verdict.startsWith("🟠")).map(r=>r.Symbol).join(", ")||"—";

  html+=`
<pre>
─────────────────────────────────────
📈 BUY       → ${buy}
👀 WATCH     → ${watch}
⏳ WAIT      → ${wait}
📉 SELL      → ${sell}
─────────────────────────────────────
</pre>
`;

  document.getElementById("output").innerHTML=html;
}

// ===============================
// RUN TECHNICAL ANALYSIS
// ===============================
async function runTechnicalAnalysis() {
  const data = await loadCSV();
  if(!data.length) return;
  
  const rows=data.map(s=>{
    const z=zones(s);
    const sc=score(s);
    const v=verdict(s,sc,z);
    return {
      Symbol:s.Symbol,
      Price:s.Price,
      Support:z.support,
      Resistance:z.resistance,
      Target:z.target.toFixed(2),
      Score:sc,
      Verdict:v.v
    };
  });

  render(rows);
}

runTechnicalAnalysis();
</script>

</body>
</html>
