<!DOCTYPE html>
<html>
<head>
<title>PSX Technical Analysis</title>
<meta charset="UTF-8">
<style>
  body { font-family: Arial; }
  button { margin: 5px; padding: 6px 12px; }
  #addForm { margin-top: 10px; padding: 10px; border: 1px solid #ccc; display:none; }
  #addForm input { width: 90px; margin: 2px; }
  table { border-collapse: collapse; margin-top: 10px; }
  th, td { border: 1px solid #999; padding: 4px 8px; font-size: 13px; }
  pre { font-size: 13px; }
</style>
</head>

<body>
<h2>PSX Technical Analysis</h2>

<button onclick="showAddForm()">Add Data</button>
<button onclick="runAnalysis()">Technical Analysis</button>

<div id="addForm">
  <h4>Add Row</h4>
  <div>
    Symbol <input id="fSymbol">
    Price <input id="fPrice">
    MA50-D <input id="fMA50D">
    MA200-D <input id="fMA200D">
    RSI-D <input id="fRSID">
    MACD-H-D <input id="fMACDDD">
    Signal-D <input id="fSignalD">
  </div>
  <div>
    MA50-W <input id="fMA50W">
    MA200-W <input id="fMA200W">
    RSI-W <input id="fRSIW">
    MACD-H-W <input id="fMACDDW">
    Signal-W <input id="fSignalW">
    Volume <input id="fVolume">
    52W-High <input id="fHigh52">
    52W-Low <input id="fLow52">
  </div>
  <button onclick="addRow()">Add</button>
  <button onclick="hideAddForm()">Close</button>

  <p><b>Updated CSV (copy into data.csv on GitHub):</b></p>
  <textarea id="csvOut" rows="8" cols="120"></textarea>
</div>

<div id="output"></div>

<script>
// ===============================
// CONFIG
// ===============================
const csvFile = "data.csv";
let inMemoryData = [];

// ===============================
// LOAD CSV
// ===============================
async function loadCSV() {
  const res = await fetch(csvFile);
  const text = await res.text();
  return parseCSV(text);
}

function parseCSV(text) {
  const lines = text.trim().split("\n");
  const headers = lines[0].split(",");
  return lines.slice(1).map(line => {
    const cols = line.split(",");
    const obj = {};
    headers.forEach((h, i) => obj[h.trim()] = cols[i] ? cols[i].trim() : "");
    return obj;
  });
}

// ===============================
// HELPERS
// ===============================
function num(v){ return v==="" ? null : Number(v); }

function zoneWidth(p){
  if(p<=50) return 3;
  if(p<=150) return 5;
  if(p<=300) return 8;
  if(p<=500) return 12;
  if(p<=700) return 15;
  return 18;
}

function range(center,w){
  return `${(center-w).toFixed(2)}–${(center+w).toFixed(2)}`;
}

// ===============================
// SUPPORT / RESISTANCE
// ===============================
function zones(s){
  const p=num(s.Price);
  const ma50=num(s["MA50-D"]);
  const ma200=num(s["MA200-D"]);
  const high52=num(s["52W-High"]);
  const w=zoneWidth(p);

  let anchors=[];
  if(ma50 && ma50<p) anchors.push(ma50);
  if(ma200 && ma200<p) anchors.push(ma200);
  anchors.sort((a,b)=>Math.abs(p-a)-Math.abs(p-b));

  let support="";
  if(anchors.length===0) support=range(p-w,w);
  else support=range(anchors[0],w);

  let resAnchor=Math.ceil(p/10)*10;
  if(high52 && Math.abs(high52-p)<=w) resAnchor=high52;
  let resistance=range(resAnchor,w);
  let target=resAnchor+w*2;

  return {support,resistance,target};
}

// ===============================
// ⭐ CORRECTED CLAUDE-MATCHING SCORING
// ===============================
function score(s){
  let pts = 0;
  let max = 0;

  const p = num(s.Price);
  const ma50 = num(s["MA50-D"]);
  const ma200 = num(s["MA200-D"]);
  const ma50w = num(s["MA50-W"]);
  const ma200w = num(s["MA200-W"]);
  const rsid = num(s["RSI-D"]);
  const rsiw = num(s["RSI-W"]);
  const macdD = num(s["MACD-H-D"]);
  const macdW = num(s["MACD-H-W"]);
  const vol = num(s["Volume"]);
  const high52 = num(s["52W-High"]);
  const low52 = num(s["52W-Low"]);

  // Price vs MA50-D (10)
  if(ma50){
    max += 10;
    if(p > ma50) pts += 10;
    else if(p < ma50) pts += 3;
  }

  // Price vs MA200-D (10)
  if(ma200){
    max += 10;
    if(p > ma200) pts += 10;
    else if(p < ma200) pts += 3;
  }

  // MA50-D vs MA200-D (8)
  if(ma50 && ma200){
    max += 8;
    if(ma50 > ma200) pts += 8;
    else pts += 2;
  }

  // MA50-W vs MA200-W (8)
  if(ma50w && ma200w){
    max += 8;
    if(ma50w > ma200w) pts += 8;
    else pts += 2;
  }

  // RSI-D (10)
  if(rsid){
    max += 10;
    if(rsid >= 40 && rsid <= 70) pts += 8;
    else if(rsid < 50) pts += 4;
    else pts += 2;
  }

  // RSI-W (10)
  if(rsiw){
    max += 10;
    if(rsiw >= 40 && rsiw <= 70) pts += 8;
    else if(rsiw < 50) pts += 4;
    else pts += 2;
  }

  // MACD Hist-D (12)
  if(macdD !== null){
    max += 12;
    if(macdD > 0) pts += 10;
    else pts += 3;
  }

  // MACD Hist-W (12)
  if(macdW !== null){
    max += 12;
    if(macdW > 0) pts += 10;
    else pts += 3;
  }

  // Volume (8)
  if(vol){
    max += 8;
    pts += 6;
  }

  // 52W Position (7)
  if(high52 && low52){
    max += 7;
    const distLow = (p - low52) / low52;
    const distHigh = (high52 - p) / high52;
    if(distLow <= 0.10) pts += 7;
    else if(distHigh <= 0.05) pts += 2;
    else pts += 4;
  }

  // S/R location (5)
  if(ma50 || ma200){
    max += 5;
    const anchor = ma50 && ma200
      ? (Math.abs(p - ma50) < Math.abs(p - ma200) ? ma50 : ma200)
      : (ma50 || ma200);
    if(anchor && Math.abs(p - anchor) / p <= 0.02) pts += 5;
    else pts += 2;
  }

  // Rescale
  let sc = max ? (pts / max) * 100 : 0;

  // Dual timeframe bonus (+5)
  if(ma50 && ma200 && ma50w && ma200w){
    const dailyUp = p>ma50 && p>ma200 && ma50>=ma200;
    const weeklyUp = ma50w > ma200w;
    if(dailyUp && weeklyUp) sc += 5;
  }

  return Math.round(Math.min(sc, 100));
}

// ===============================
// VERDICT (SKILL RULES)
// ===============================
function verdict(s,score,z){
  const p = num(s.Price);
  const ma50 = num(s["MA50-D"]);
  const ma200 = num(s["MA200-D"]);
  const ma50w = num(s["MA50-W"]);
  const ma200w = num(s["MA200-W"]);
  const rsid = num(s["RSI-D"]);
  const macdD = num(s["MACD-H-D"]);
  const macdW = num(s["MACD-H-W"]);
  const signalD = num(s["Signal-D"]);

  const [s1] = z.support.split("–").map(Number);
  const reward = Math.abs(z.target - p);
  const risk = Math.abs(p - s1);
  const rr = risk === 0 ? 0 : reward / risk;

  // Claude BUY logic
  const macdTurningUp = (macdD < 0 && signalD > macdD);

  let v = "⚪ WAIT";

  const buyCond =
    p > ma50 &&
    p > ma200 &&
    ma50 >= ma200 &&
    ma50w > ma200w &&
    (macdD > 0 || macdTurningUp) &&
    rsid >= 40 && rsid <= 70 &&
    rr >= 1.5;

  const shortCond =
    p < ma50 &&
    p < ma200 &&
    ma50 < ma200 &&
    macdD < 0 &&
    macdW < 0 &&
    rsid < 50 &&
    rr >= 1.5;

  if(buyCond) v="🟢 BUY";
  else if(shortCond) v="🟠 SHORT SALE";
  else if(macdD < 0 && macdW < 0) v="🔴 SELL";
  else if(score >= 45 && score < 60) v="🟡 WATCH";
  else if(score < 45) v="⚫ AVOID";

  return {v, rr: rr.toFixed(2)};
}

// ===============================
// TRADE PLANS (GENERIC)
// ===============================
function tradePlan(r){
  const p = num(r.Price);
  const verdict = r.Verdict;
  const score = r.Score;

  if(verdict.startsWith("🟢")){
    return `
🟢 ${r.Symbol} — Buy Plan | Score: ${score}
Entry: ${r.Support} | Target: ${r.Target} | Support: ${r.Support} | R:R ≈ ${r.RR}
At ₨${p}: BUY NOW if price is near support; otherwise WAIT for pullback.
`;
  }

  if(verdict.startsWith("🟠")){
    return `
🟠 ${r.Symbol} — Short Sale Plan | Score: ${score}
Entry: ${r.Resistance} | Stop Loss: ${r.Target} | Target: ${r.Support} | R:R ≈ ${r.RR}
At ₨${p}: SHORT NOW only if price is near resistance.
`;
  }

  if(verdict.startsWith("🔴")){
    return `
🔴 ${r.Symbol} — Sell Plan | Score: ${score}
Exit zone: ${r.Resistance}
Reason: MACD bearish both timeframes / losing MAs
At ₨${p}: EXIT NOW or TRIM.
`;
  }

  return "";
}

// ===============================
// RENDER
// ===============================
function render(rows){
  const order = {"🟢":1,"🟡":2,"⚪":3,"🔴":4,"🟠":4,"⚫":5};
  rows.sort((a,b)=>{
    const va = order[a.Verdict[0]] || 9;
    const vb = order[b.Verdict[0]] || 9;
    if(va!==vb) return va-vb;
    return b.Score - a.Score;
  });

  let html="<table><tr><th>#</th><th>Symbol</th><th>Price</th><th>Support</th><th>Resistance</th><th>Target</th><th>Score</th><th>Verdict</th></tr>";

  rows.forEach((r,i)=>{
    html+=`<tr>
      <td>${i+1}</td>
      <td>${r.Symbol}</td>
      <td>${r.Price}</td>
      <td>${r.Support}</td>
      <td>${r.Resistance}</td>
      <td>${r.Target}</td>
      <td>${r.Score}</td>
      <td>${r.Verdict}</td>
    </tr>`;
  });

  html+="</table>";

  const buy=rows.filter(r=>r.Verdict.startsWith("🟢")).map(r=>r.Symbol).join(", ")||"—";
  const watch=rows.filter(r=>r.Verdict.startsWith("🟡")).map(r=>r.Symbol).join(", ")||"—";
  const wait=rows.filter(r=>r.Verdict.startsWith("⚪")).map(r=>r.Symbol).join(", ")||"—";
  const ss=rows.filter(r=>r.Verdict.startsWith("🔴")||r.Verdict.startsWith("🟠")).map(r=>r.Symbol).join(", ")||"—";

  html+=`
<pre>
─────────────────────────────────────
📈 BUY       → ${buy}
👀 WATCH     → ${watch}
⏳ WAIT      → ${wait}
📉 SELL/SHORT→ ${ss}
─────────────────────────────────────
</pre>
`;

  html+=`<h3>Trade Plans</h3>`;
  rows.forEach(r=>{
    const z=zones(r);
    const rr = (Math.abs(z.target - num(r.Price)) / Math.abs(num(r.Price) - Number(z.support.split("–")[0]))).toFixed(2);
    r.RR = rr;
    html+=`<pre>${tradePlan(r)}</pre>`;
  });

  document.getElementById("output").innerHTML=html;
}

// ===============================
// ADD DATA FORM
// ===============================
function showAddForm(){ document.getElementById("addForm").style.display="block"; }
function hideAddForm(){ document.getElementById("addForm").style.display="none"; }

function addRow(){
  const s = {
    Symbol: fSymbol.value,
    Price: fPrice.value,
    "MA50-D": fMA50D.value,
    "MA200-D": fMA200D.value,
    "RSI-D": fRSID.value,
    "MACD-H-D": fMACDDD.value,
    "Signal-D": fSignalD.value,
    "MA50-W": fMA50W.value,
    "MA200-W": fMA200W.value,
    "RSI-W": fRSIW.value,
    "MACD-H-W": fMACDDW.value,
    "Signal-W": fSignalW.value,
    "Volume": fVolume.value,
    "52W-High": fHigh52.value,
    "52W-Low": fLow52.value
  };
  inMemoryData.push(s);
  updateCSVOutput();
  runAnalysis();
}

function updateCSVOutput(){
  const headers = [
    "Symbol","Price","MA50-D","MA200-D","RSI-D","MACD-H-D","Signal-D",
    "MA50-W","MA200-W","RSI-W","MACD-H-W","Signal-W","Volume","52W-High","52W-Low"
  ];
  let lines = [headers.join(",")];
  inMemoryData.forEach(r=>{
    lines.push(headers.map(h=>r[h] ?? "").join(","));
  });
  csvOut.value = lines.join("\n");
}

// ===============================
// RUN ANALYSIS
// ===============================
function runAnalysis(){
  if(inMemoryData.length>0){
    const rows = inMemoryData.map(s=>{
      const z=zones(s);
      const sc=score(s);
      const v=verdict(s,sc,z);
      return {
        Symbol:s.Symbol,
        Price:s.Price,
        Support:z.support,
        Resistance:z.resistance,
        Target:z.target.toFixed(2),
        Score:sc,
        Verdict:v.v
      };
    });
    render(rows);
  } else {
    loadCSV().then(data => {
      inMemoryData = data;
      updateCSVOutput();
      const rows=data.map(s=>{
        const z=zones(s);
        const sc=score(s);
        const v=verdict(s,sc,z);
        return {
          Symbol:s.Symbol,
          Price:s.Price,
          Support:z.support,
          Resistance:z.resistance,
          Target:z.target.toFixed(2),
          Score:sc,
          Verdict:v.v
        };
      });
      render(rows);
    });
  }
}

// initial run
runAnalysis();
</script>

</body>
</html>
