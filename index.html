<!DOCTYPE html>
<html>
<head>
<title>PSX Technical Analysis</title>
<meta charset="UTF-8">
</head>

<body>
<h2>PSX Technical Analysis</h2>

<div id="output"></div>

<script>
// ===============================
// CONFIG
// ===============================
const csvFile = "data.csv";   // MUST match your file name

// ===============================
// LOAD CSV
// ===============================
async function loadCSV() {
  const res = await fetch(csvFile);
  const text = await res.text();
  return parseCSV(text);
}

function parseCSV(text) {
  const lines = text.trim().split("\n");
  const headers = lines[0].split(",");
  return lines.slice(1).map(line => {
    const cols = line.split(",");
    const obj = {};
    headers.forEach((h, i) => obj[h.trim()] = cols[i] ? cols[i].trim() : "");
    return obj;
  });
}

// ===============================
// HELPERS
// ===============================
function num(v){ return v==="" ? null : Number(v); }

function zoneWidth(p){
  if(p<=50) return 3;
  if(p<=150) return 5;
  if(p<=300) return 8;
  if(p<=500) return 12;
  if(p<=700) return 15;
  return 18;
}

function range(center,w){
  return `${(center-w).toFixed(2)}–${(center+w).toFixed(2)}`;
}

// ===============================
// SUPPORT / RESISTANCE
// ===============================
function zones(s){
  const p=num(s.Price);
  const ma50=num(s["MA50-D"]);
  const ma200=num(s["MA200-D"]);
  const high52=num(s["52W-High"]);
  const w=zoneWidth(p);

  let anchors=[];
  if(ma50 && ma50<p) anchors.push(ma50);
  if(ma200 && ma200<p) anchors.push(ma200);
  anchors.sort((a,b)=>Math.abs(p-a)-Math.abs(p-b));

  let support="";
  if(anchors.length===0) support=range(p-w,w);
  else support=range(anchors[0],w);

  let resAnchor=Math.ceil(p/10)*10;
  if(high52 && Math.abs(high52-p)<=w) resAnchor=high52;
  let resistance=range(resAnchor,w);
  let target=resAnchor+w*2;

  return {support,resistance,target};
}

// ===============================
// SKILL-BASED SCORING
// ===============================
function score(s){
  let pts = 0;
  let max = 0;

  const p = num(s.Price);
  const ma50 = num(s["MA50-D"]);
  const ma200 = num(s["MA200-D"]);
  const ma50w = num(s["MA50-W"]);
  const ma200w = num(s["MA200-W"]);
  const rsid = num(s["RSI-D"]);
  const rsiw = num(s["RSI-W"]);
  const macdD = num(s["MACD-H-D"]);
  const macdW = num(s["MACD-H-W"]);
  const vol = num(s["Volume"]);
  const high52 = num(s["52W-High"]);
  const low52 = num(s["52W-Low"]);

  // Price vs MA50-D
  if(ma50){ max+=10; pts += (p > ma50 ? 10 : 5); }

  // Price vs MA200-D
  if(ma200){ max+=10; pts += (p > ma200 ? 10 : 5); }

  // MA50-D vs MA200-D
  if(ma50 && ma200){ max+=8; pts += (ma50 >= ma200 ? 8 : 4); }

  // Weekly MA cross
  if(ma50w && ma200w){ max+=8; pts += (ma50w >= ma200w ? 8 : 4); }

  // RSI-D
  if(rsid){ max+=10; pts += (rsid>=40 && rsid<=70 ? 10 : (rsid<50 ? 5 : 0)); }

  // RSI-W
  if(rsiw){ max+=10; pts += (rsiw>=40 && rsiw<=70 ? 10 : (rsiw<55 ? 5 : 0)); }

  // MACD-H-D
  if(macdD !== null){ max+=12; pts += (macdD>0 ? 12 : 6); }

  // MACD-H-W
  if(macdW !== null){ max+=12; pts += (macdW>0 ? 12 : 6); }

  // Volume
  if(vol){ max+=8; pts += 6; }

  // 52W position
  if(high52 && low52){
    max+=7;
    const distLow = (p - low52) / low52;
    const distHigh = (high52 - p) / high52;
    if(distLow <= 0.10) pts += 7;
    else if(distHigh <= 0.05) pts += 2;
    else pts += 4;
  }

  // Rescale
  let sc = max ? (pts/max)*100 : 0;

  // Dual timeframe bonus
  if(ma50 && ma200 && ma50w && ma200w){
    const dailyUp = p>ma50 && p>ma200 && ma50>=ma200;
    const weeklyUp = ma50w>=ma200w;
    if(dailyUp && weeklyUp) sc += 5;
  }

  return Math.round(Math.min(sc,100));
}

// ===============================
// VERDICT (SKILL RULES)
// ===============================
function verdict(s,scoreVal,z){
  const p = num(s.Price);
  const ma50 = num(s["MA50-D"]);
  const ma200 = num(s["MA200-D"]);
  const ma50w = num(s["MA50-W"]);
  const ma200w = num(s["MA200-W"]);
  const rsid = num(s["RSI-D"]);
  const macdD = num(s["MACD-H-D"]);
  const macdW = num(s["MACD-H-W"]);

  const [s1] = z.support.split("–").map(Number);
  const reward = Math.abs(z.target - p);
  const risk = Math.abs(p - s1);
  const rr = risk === 0 ? 0 : reward / risk;

  let v = "⚪ WAIT";

  const buyCond =
    p>ma50 && p>ma200 &&
    ma50>=ma200 &&
    ma50w>=ma200w &&
    macdD>=0 &&
    rsid>=40 && rsid<=70 &&
    rr>=1.5;

  const shortCond =
    p<ma50 && p<ma200 &&
    ma50<ma200 &&
    macdD<0 && macdW<0 &&
    rsid<50 &&
    rr>=1.5;

  if(buyCond) v="🟢 BUY";
  else if(shortCond) v="🟠 SHORT SALE";
  else if(macdD<0 && macdW<0) v="🔴 SELL";
  else if(scoreVal>=45 && scoreVal<60) v="🟡 WATCH";
  else if(scoreVal<45) v="⚫ AVOID";

  return {v, rr: rr.toFixed(2)};
}

// ===============================
// RENDER
// ===============================
function render(rows){
  let html="<table border='1' cellpadding='5'><tr><th>#</th><th>Symbol</th><th>Price</th><th>Support</th><th>Resistance</th><th>Target</th><th>Score</th><th>Verdict</th></tr>";

  rows.forEach((r,i)=>{
    html+=`<tr>
      <td>${i+1}</td>
      <td>${r.Symbol}</td>
      <td>${r.Price}</td>
      <td>${r.Support}</td>
      <td>${r.Resistance}</td>
      <td>${r.Target}</td>
      <td>${r.Score}</td>
      <td>${r.Verdict}</td>
    </tr>`;
  });

  html+="</table>";

  const buy=rows.filter(r=>r.Verdict.startsWith("🟢")).map(r=>r.Symbol).join(", ")||"—";
  const watch=rows.filter(r=>r.Verdict.startsWith("🟡")).map(r=>r.Symbol).join(", ")||"—";
  const wait=rows.filter(r=>r.Verdict.startsWith("⚪")).map(r=>r.Symbol).join(", ")||"—";
  const ss=rows.filter(r=>r.Verdict.startsWith("🔴")||r.Verdict.startsWith("🟠")).map(r=>r.Symbol).join(", ")||"—";

  html+=`
<pre>
─────────────────────────────────────
📈 BUY       → ${buy}
👀 WATCH     → ${watch}
⏳ WAIT      → ${wait}
📉 SELL/SHORT→ ${ss}
─────────────────────────────────────
</pre>
`;

  document.getElementById("output").innerHTML=html;
}

// ===============================
// RUN
// ===============================
loadCSV().then(data => {
  const rows=data.map(s=>{
    const z=zones(s);
    const sc=score(s);
    const v=verdict(s,sc,z);
    return {
      Symbol:s.Symbol,
      Price:s.Price,
      Support:z.support,
      Resistance:z.resistance,
      Target:z.target.toFixed(2),
      Score:sc,
      Verdict:v.v
    };
  });

  render(rows);
});
</script>

</body>
</html>
