<!DOCTYPE html>
<html>
<head>
<title>PSX Technical Analysis</title>
<meta charset="UTF-8">
</head>

<body>
<h2>PSX Technical Analysis</h2>

<div id="output"></div>

<script>
// ===============================
// CONFIG
// ===============================
const csvFile = "data.csv";

// ===============================
// LOAD CSV
// ===============================
async function loadCSV() {
  const res = await fetch(csvFile);
  const text = await res.text();
  return parseCSV(text);
}

function parseCSV(text) {
  const lines = text.trim().split("\n");
  const headers = lines[0].split(",");
  return lines.slice(1).map(line => {
    const cols = line.split(",");
    const obj = {};
    headers.forEach((h, i) => obj[h.trim()] = cols[i] ? cols[i].trim() : "");
    return obj;
  });
}

// ===============================
// HELPERS
// ===============================
function num(v){ return v==="" ? null : Number(v); }

function zoneWidth(p){
  if(p<=50) return 3;
  if(p<=150) return 5;
  if(p<=300) return 8;
  if(p<=500) return 12;
  if(p<=700) return 15;
  return 18;
}

function range(center,w){
  return `${(center-w).toFixed(2)}–${(center+w).toFixed(2)}`;
}

// ===============================
// SUPPORT / RESISTANCE
// ===============================
function zones(s){
  const p=num(s.Price);
  const ma50=num(s["MA50-D"]);
  const ma200=num(s["MA200-D"]);
  const high52=num(s["52W-High"]);
  const w=zoneWidth(p);

  let anchors=[];
  if(ma50 && ma50<p) anchors.push(ma50);
  if(ma200 && ma200<p) anchors.push(ma200);
  anchors.sort((a,b)=>Math.abs(p-a)-Math.abs(p-b));

  let support="";
  if(anchors.length===0) support=range(p-w,w);
  else support=range(anchors[0],w);

  let resAnchor=Math.ceil(p/10)*10;
  if(high52 && Math.abs(high52-p)<=w) resAnchor=high52;
  let resistance=range(resAnchor,w);
  let target=resAnchor+w*2;

  return {support,resistance,target};
}

// ===============================
// SCORING
// ===============================
function score(s){
  let total=0, max=0;

  const p=num(s.Price);
  const ma50=num(s["MA50-D"]);
  const ma200=num(s["MA200-D"]);
  const ma50w=num(s["MA50-W"]);
  const ma200w=num(s["MA200-W"]);
  const rsid=num(s["RSI-D"]);
  const rsiw=num(s["RSI-W"]);
  const macdD=num(s["MACD-H-D"]);
  const macdW=num(s["MACD-H-W"]);
  const high52=num(s["52W-High"]);
  const low52=num(s["52W-Low"]);

  if(ma50){ max+=10; total+= p>ma50?10:5; }
  if(ma200){ max+=10; total+= p>ma200?10:5; }
  if(ma50&&ma200){ max+=8; total+= ma50>ma200?8:4; }
  if(ma50w&&ma200w){ max+=8; total+= ma50w>ma200w?8:4; }

  if(rsid){ max+=10; total+= (rsid>=40&&rsid<=70)?10:(rsid<50?5:0); }
  if(rsiw){ max+=10; total+= (rsiw>=40&&rsiw<=70)?10:(rsiw<55?5:0); }

  if(macdD!==null){ max+=12; total+= macdD>0?10:4; }
  if(macdW!==null){ max+=12; total+= macdW>0?10:4; }

  if(high52&&low52){
    max+=7;
    const distLow=(p-low52)/low52;
    const distHigh=(high52-p)/high52;
    if(distLow<=0.3) total+=7;
    else if(distHigh<=0.05) total+=2;
    else total+=4;
  }

  let sc=max?(total/max)*100:0;

  if(ma50&&ma200&&ma50w&&ma200w){
    const dailyUp=p>ma50&&p>ma200&&ma50>=ma200;
    const weeklyUp=ma50w>ma200w;
    if(dailyUp&&weeklyUp) sc=Math.min(100,sc+5);
  }

  return Math.round(sc);
}

// ===============================
// VERDICT
// ===============================
function verdict(s,score,z){
  const p=num(s.Price);
  const ma50=num(s["MA50-D"]);
  const ma200=num(s["MA200-D"]);
  const ma50w=num(s["MA50-W"]);
  const ma200w=num(s["MA200-W"]);
  const rsid=num(s["RSI-D"]);
  const macdD=num(s["MACD-H-D"]);
  const macdW=num(s["MACD-H-W"]);
  const high52=num(s["52W-High"]);

  const [s1,s2]=z.support.split("–").map(Number);
  const reward=Math.abs(z.target-p);
  const risk=Math.abs(p-s1);
  const rr=risk===0?0:(reward/risk);

  const aboveMA = ma50&&ma200&&p>ma50&&p>ma200;
  const goldenDaily = ma50&&ma200&&ma50>=ma200;
  const goldenWeekly = ma50w&&ma200w&&ma50w>ma200w;
  const rsiBuy = rsid>=40&&rsid<=70;
  const macdBull = macdD>=0;
  const macdBear = macdD<0 && macdW<0;
  const belowMA = ma50&&ma200&&p<ma50&&p<ma200;

  let v="⚪ WAIT";

  if(aboveMA && goldenDaily && goldenWeekly && macdBull && rsiBuy && rr>=1.5) v="🟢 BUY";
  else if(macdBear || (high52 && p>=high52*0.95)) v="🔴 SELL";
  else if(belowMA && macdBear && rsid<50 && rr>=1.5) v="🟠 SHORT SALE";
  else if(score>=45 && score<60) v="🟡 WATCH";
  else if(score<45) v="⚫ AVOID";

  return {v,rr:rr.toFixed(2)};
}

// ===============================
// RENDER
// ===============================
function render(rows){
  let html="<table border='1' cellpadding='5'><tr><th>#</th><th>Symbol</th><th>Price</th><th>Support</th><th>Resistance</th><th>Target</th><th>Verdict</th></tr>";

  rows.forEach((r,i)=>{
    html+=`<tr>
      <td>${i+1}</td>
      <td>${r.Symbol}</td>
      <td>${r.Price}</td>
      <td>${r.Support}</td>
      <td>${r.Resistance}</td>
      <td>${r.Target}</td>
      <td>${r.Verdict}</td>
    </tr>`;
  });

  html+="</table>";

  const buy=rows.filter(r=>r.Verdict.startsWith("🟢")).map(r=>r.Symbol).join(", ")||"—";
  const watch=rows.filter(r=>r.Verdict.startsWith("🟡")).map(r=>r.Symbol).join(", ")||"—";
  const wait=rows.filter(r=>r.Verdict.startsWith("⚪")).map(r=>r.Symbol).join(", ")||"—";
  const ss=rows.filter(r=>r.Verdict.startsWith("🔴")||r.Verdict.startsWith("🟠")).map(r=>r.Symbol).join(", ")||"—";

  html+=`
<pre>
─────────────────────────────────────
📈 BUY       → ${buy}
👀 WATCH     → ${watch}
⏳ WAIT      → ${wait}
📉 SELL/SHORT→ ${ss}
─────────────────────────────────────
</pre>
`;

  document.getElementById("output").innerHTML=html;
}

// ===============================
// RUN
// ===============================
loadCSV().then(data.csv=>{
  const rows=data.csv.map(s=>{
    const z=zones(s);
    const sc=score(s);
    const v=verdict(s,sc,z);
    return {
      Symbol:s.Symbol,
      Price:s.Price,
      Support:z.support,
      Resistance:z.resistance,
      Target:z.target.toFixed(2),
      Verdict:v.v,
      Score:sc
    };
  });

  render(rows);
});
</script>

</body>
</html>
